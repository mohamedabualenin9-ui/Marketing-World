<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marketing World</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header مع اللوجو -->
    <header>
        <div class="logo-container">
            <!-- ضع صورتك هنا -->
            <img src="logo.png" alt="Marketing World Logo" class="logo-image">
            <div class="title" data-i18n="">Marketing World</div>
        </div>

        <div class="language-buttons">
            <button id="btnEnglish" class="lang-btn" data-lang="en">ENGLISH</button>
            <button id="btnArabic" class="lang-btn" data-lang="ar">العربية</button>
        </div>
    </header>

    <!-- Main products -->
    <section class="main-products">
    </section>

    <!-- Secondary products -->
    <section class="secondary-products">
    </section>

    <!-- Email section -->
    <section class="email-section">
        <div class="email-form">
            <form id="subscribeForm" class="email-form-row">
                <input type="email" id="emailInput" class="email-input"
                    placeholder="Enter your email to get exclusive offers" required
                    data-i18n-placeholder="email_placeholder">
                <button type="submit" class="email-btn" data-i18n="btn_subscribe">Subscribe Now</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="social-icons">
            <a href="https://facebook.com" class="social-icon facebook" aria-label="Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="https://instagram.com" class="social-icon instagram" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://tiktok.com" class="social-icon tiktok" aria-label="TikTok">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://pinterest.com" class="social-icon pinterest" aria-label="Pinterest">
                <i class="fab fa-pinterest"></i>
            </a>
            <a href="https://linkedin.com" class="social-icon linkedin" aria-label="LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </div>

        <div class="footer-description">
            <p data-i18n="footer_text">© 2025 Marketing World. All rights reserved.</p>
        </div>
    </footer>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true">
            <button class="modal-close" id="modalCloseBtn" aria-label="Close preview">&times;</button>
            <div class="modal-image-wrapper">
                <img id="modalImage" src="" alt="Preview image">
            </div>
            <div class="modal-info">
                <h3 id="modalTitle">Product name</h3>
                <p id="modalPrice">$0.00</p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true">
            <button class="modal-close" id="editModalCloseBtn" aria-label="Close edit">&times;</button>
            <h3>Edit Product</h3>
            <form id="editForm">
                <input type="hidden" id="editProductId">
                <label for="editTitle">Title</label>
                <input type="text" id="editTitle" required>
                <label for="editPrice">Price</label>
                <input type="text" id="editPrice" required>
                <label for="editDescription">Description</label>
                <textarea id="editDescription"></textarea>
                <label for="editLink">Buy Link</label>
                <input type="url" id="editLink">
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="addModal" class="modal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true">
            <button class="modal-close" id="addModalCloseBtn" aria-label="Close add">&times;</button>
            <h3>Add New Product</h3>
            <form id="addForm">
                <input type="hidden" id="addProductType">
                <label for="addTitle">Title</label>
                <input type="text" id="addTitle" required>
                <label for="addPrice">Price</label>
                <input type="text" id="addPrice" required>
                <label for="addDescription">Description</label>
                <textarea id="addDescription"></textarea>
                <label for="addLink">Buy Link</label>
                <input type="url" id="addLink">
                <label for="addImage">Image URL</label>
                <input type="url" id="addImage">
                <button type="submit">Add Product</button>
            </form>
        </div>
    </div>

    <div class="control-buttons">
        <button class="control-btn" onclick="addNewProduct('main')">
            <i class="fas fa-plus"></i> <span data-i18n="add_main">Add Main Product</span>
        </button>
        <button class="control-btn" onclick="addNewProduct('secondary')">
            <i class="fas fa-plus"></i> <span data-i18n="add_secondary">Add Secondary Product</span>
        </button>
        <button class="control-btn" onclick="saveToLocalStorage(); showNotification(saved_text())">
            <i class="fas fa-save"></i> <span data-i18n="save_all">Save All</span>
        </button>
        <button class="control-btn" onclick="exportData()">
            <i class="fas fa-download"></i> <span data-i18n="export_data">Export Data</span>
        </button>
        <button class="control-btn" onclick="importData()">
            <i class="fas fa-upload"></i> <span data-i18n="import_data">Import Data</span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
